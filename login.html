<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Ashure Heaben Resort Management System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap"
        rel="stylesheet"
    />

    <!-- Splash screen styles (CSS custom properties used by login.css) -->
    <link rel="stylesheet" href="assets/css/splash.css" />
    <link rel="stylesheet" href="assets/css/login.css" />
</head>

<body>
    <main class="login" id="loginPage" role="main" aria-label="Login page">
        <div class="login__card">
            <div class="login__system-card">
                <img
                    class="login__logo login__logo--system"
                    src="assets/images/system-logo.png"
                    alt="Ashure Heaben Resort Management System Logo"
                />
            </div>

            <h1 class="login__title">
                Hotel Reservation<br />Management System
            </h1>

            <form class="login__form" id="loginForm" novalidate>
                <div class="login__field">
                    <div class="login__input-wrap">
                        <svg class="login__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        <input
                            type="text"
                            id="username"
                            class="login__input"
                            placeholder="Username"
                            autocomplete="username"
                        />
                    </div>
                </div>

                <div class="login__field">
                    <div class="login__input-wrap">
                        <svg class="login__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <input
                            type="password"
                            id="password"
                            class="login__input"
                            placeholder="Password"
                            autocomplete="current-password"
                        />
                    </div>
                </div>

                <div class="login__message" id="loginMessage" aria-live="polite"></div>

                <button type="submit" class="login__btn login__btn--primary">Login</button>
            </form>
        </div>
    </main>

    <script src="assets/js/login.js"></script>
</body>
</html>
