<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ashure Heaben Resort Management System</title>

    <!-- ============================================================
         Poppins font (Google Fonts) — multiple weights
         ============================================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap"
        rel="stylesheet"
    />

    <!-- Splash screen styles -->
    <link rel="stylesheet" href="assets/css/splash.css" />
    <!-- Login page styles -->
    <link rel="stylesheet" href="assets/css/login.css" />
    <!-- App shell styles -->
    <link rel="stylesheet" href="assets/css/app.css" />
</head>

<body>
    <!-- ============================================================
         SPLASH SCREEN (Screen 1)
         A premium, app-like intro over a themed gradient backdrop.
         ============================================================ -->

    <!-- Centered splash stage -->
    <main class="splash" role="main" aria-label="Loading screen">

        <img
            class="splash__logo splash__logo--school splash__school-logo"
            src="assets/images/school-logo.png"
            alt="Bestlink College of the Philippines Logo"
        />

        <!-- White glassmorphism card holding all content -->
        <section class="splash__card">

            <!-- ---- System logo inside a glass card ---- -->
            <div class="splash__system-card">
                <img
                    class="splash__logo splash__logo--system"
                    src="assets/images/system-logo.png"
                    alt="Ashure Heaben Resort Management System Logo"
                />
            </div>

            <!-- ---- Project title (prominent, two lines) ---- -->
            <h1 class="splash__title">
                <span class="splash__title-line1">ASHURE HEABEN HOTEL</span>
                <span class="splash__title-line2">Reservation System</span>
            </h1>

            <!-- ---- Slogan (italic, smaller) ---- -->
            <p class="splash__slogan">Relax. Unwind. Belong.</p>

            <!-- ---- Modern animated progress bar ---- -->
            <div class="splash__progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                <div class="splash__progress-fill" id="progressFill"></div>
            </div>

            <!-- ---- Loading text + percentage ---- -->
            <div class="splash__status">
                <span class="splash__loading-text" id="loadingText">Initializing...</span>
                <span class="splash__percent" id="percentText">0%</span>
            </div>

            <!-- ---- Project / group meta information ---- -->
            <footer class="splash__meta">
                <span class="splash__meta-degree">Bachelor of Science in Information Technology</span>
                <span class="splash__meta-row">
                    <span class="splash__meta-item">Section 21002</span>
                    <span class="splash__meta-separator">•</span>
                    <span class="splash__meta-item">Group 5</span>
                </span>
            </footer>

        </section>
    </main>

    <!-- ============================================================
         LOGIN PAGE (Screen 2)
         Initially hidden; shown after splash loading completes.
         ============================================================ -->
    <main class="login" id="loginPage" role="main" aria-label="Login page">
        <div class="login__card">
            <div class="login__system-card">
                <img
                    class="login__logo login__logo--system"
                    src="assets/images/system-logo.png"
                    alt="Ashure Heaben Resort Management System Logo"
                />
            </div>

            <h1 class="login__title">
                Hotel Reservation<br />Management System
            </h1>

            <form class="login__form" id="loginForm" novalidate>
                <div class="login__field">
                    <div class="login__input-wrap">
                        <svg class="login__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        <input
                            type="text"
                            id="username"
                            class="login__input"
                            placeholder="Username"
                            autocomplete="username"
                        />
                    </div>
                </div>

                <div class="login__field">
                    <div class="login__input-wrap">
                        <svg class="login__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <input
                            type="password"
                            id="password"
                            class="login__input"
                            placeholder="Password"
                            autocomplete="current-password"
                        />
                    </div>
                </div>

                <div class="login__message" id="loginMessage" aria-live="polite"></div>

                <button type="submit" class="login__btn login__btn--primary">Login</button>
                <button type="button" class="login__btn login__btn--exit" id="exitBtn">Exit</button>
            </form>
        </div>
    </main>

    <!-- Splash screen behavior (loading simulation) -->
    <script src="assets/js/splash.js"></script>
    <!-- Login page behavior -->
    <script src="assets/js/login.js"></script>
</body>
</html>
